name: Deploy Python Backend to Elastic Beanstalk

on:
  push:
    branches:
      - dev
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # (optional) tests
      # - name: Run tests
      #   run: pytest

      - name: Zip application for Beanstalk
        run: |
          zip -r app.zip . -x "*.git*" "__pycache__/*" "tests/*"
          # Ensure .platform directory is included for EB hooks

      - name: Deploy to Elastic Beanstalk
        uses: einaregilsson/beanstalk-deploy@v20
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          region: ${{ secrets.AWS_REGION }}
          application_name: ${{ secrets.EB_APP_NAME_DATA_DEV }}
          environment_name: ${{ secrets.EB_ENV_NAME_DATA_DEV }}
          version_label: ${{ github.sha }}
          deployment_package: app.zip
          use_existing_version_if_available: true
